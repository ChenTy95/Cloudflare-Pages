<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ChenTy95</title>
<style>
/* ===== CSS Variables (sync with calc) ===== */
:root {
  --bg-page: linear-gradient(135deg, #f7f3ed 0%, #eee7dc 40%, #e8dfd3 100%);
  --card-bg: #fffdf9;
  --card-shadow: 0 2px 20px rgba(0,0,0,0.06), 0 8px 40px rgba(0,0,0,0.04);
  --card-hover-shadow: 0 4px 28px rgba(0,0,0,0.1), 0 12px 48px rgba(0,0,0,0.06);
  --text-primary: #2d2a26;
  --text-secondary: #7a7368;
  --text-muted: #b0a89c;
  --accent: #e8813b;
  --accent-subtle: #fff2e8;
  --cell-border: #e6e1d9;
  --numpad-btn-bg: #f0ece7;
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --font-stack: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", system-ui, -apple-system, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: var(--font-stack);
  background: var(--bg-page);
  color: var(--text-primary);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  min-height: 100dvh;
  padding: 16px;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Main Card ===== */
.main-card {
  width: 100%;
  max-width: 420px;
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  box-shadow: var(--card-shadow);
  padding: 36px 24px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== Avatar ===== */
.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid var(--cell-border);
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  transition: transform 0.25s ease;
}

.avatar:hover {
  transform: scale(1.05);
}

/* ===== Name & Intro ===== */
.name {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.5px;
}

.bio {
  font-size: 0.85rem;
  color: var(--text-secondary);
  text-align: center;
  line-height: 1.6;
  margin-top: -12px;
}

/* ===== Divider ===== */
.divider {
  width: 60px;
  height: 2px;
  background: var(--cell-border);
  border-radius: 1px;
}

/* ===== Card Grid ===== */
.card-grid {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ===== Page Link Card ===== */
.page-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: var(--numpad-btn-bg);
  border: 1.5px solid var(--cell-border);
  border-radius: var(--radius-md);
  text-decoration: none;
  color: var(--text-primary);
  transition: all 0.2s ease;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.page-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--card-hover-shadow);
  border-color: var(--accent);
}

.page-card:active {
  transform: scale(0.98);
}

.card-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  background: var(--accent-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}

.card-icon svg {
  width: 28px;
  height: 28px;
}

.card-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.card-title {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-primary);
}

.card-desc {
  font-size: 0.75rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-arrow {
  color: var(--text-muted);
  font-size: 1.1rem;
  margin-left: auto;
  flex-shrink: 0;
}

/* ===== Footer ===== */
.footer {
  margin-top: 16px;
  font-size: 0.68rem;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.8;
  letter-spacing: 0.3px;
}

/* ===== Responsive ===== */
@media (max-width: 370px) {
  .main-card { padding: 28px 16px 22px; gap: 18px; }
  .avatar { width: 80px; height: 80px; }
  .name { font-size: 1.2rem; }
  .page-card { padding: 12px 14px; gap: 10px; }
  .card-icon { width: 40px; height: 40px; }
  .card-icon svg { width: 24px; height: 24px; }
}
</style>
</head>
<body>

<div class="main-card">
  <img class="avatar"
       src="https://avatars.githubusercontent.com/u/29172983?v=4"
       alt="ChenTy95"
       loading="eager"
       onerror="this.style.display='none'">

  <div class="name">ChenTy95</div>

  <div class="bio">搞搞网络，写写代码</div>

  <div class="divider"></div>

  <div class="card-grid">
    <!-- 价格比对工具 -->
    <a class="page-card" href="/calc/">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#e8813b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="9" r="2"/>
          <circle cx="15" cy="15" r="2"/>
          <line x1="7" y1="12" x2="13" y2="12"/>
          <line x1="13" y1="7" x2="11" y2="9"/>
          <line x1="14" y1="14" x2="10" y2="18"/>
          <rect x="3" y="3" width="18" height="18" rx="3"/>
        </svg>
      </div>
      <div class="card-info">
        <span class="card-title">价格比对工具</span>
        <span class="card-desc">多规格商品单价对比</span>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <!-- ↓ 后续新页面卡片加在这里 ↓ -->
  </div>

  <div class="footer">
    <div>基于 Claude Code &amp; DeepSeek 构建</div>
    <div>© <span id="footer-year"></span> ChenTy95</div>
  </div>
</div>

<script>
document.getElementById('footer-year').textContent = new Date().getFullYear();
</script>

</body>
</html>
