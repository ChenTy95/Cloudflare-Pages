<!DOCTYPE html>
<html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0;" />
	<link rel="stylesheet" type="text/css" href="css.css" />
	<script type="text/javascript" src="calc.js"></script>
	<title>简易价格比对工具</title>

</head>

<body>
	<div class="ResDiv">
		<button class="topic">同产品多规格价格比对工具</button>
		<button class="label25p">规格3</button>
		<button class="label25p">规格2</button>
		<button class="label25p">规格1</button>
		<input type="hidden" id="selected" value="quantity1" />
		<div class="main" style="margin-top:50px; height:200px">
			<button class="label20p">规格</button>
			<button class="width25p" id="quantity3" onclick="setInput('quantity3');">-</button>
			<button class="width25p" id="quantity2" onclick="setInput('quantity2');">-</button>
			<button class="width25pFocus" id="quantity1" onclick="setInput('quantity1');"></button>
			
			<button class="label20p">价格</button>
			<button class="width25p" id="price3" onclick="setInput('price3');">-</button>
			<button class="width25p" id="price2" onclick="setInput('price2');">-</button>
			<button class="width25p" id="price1" onclick="setInput('price1');">-</button>
			
			<button class="label20p">单价</button>
			<button class="width25p" id="unit-price3">-</button>
			<button class="width25p" id="unit-price2">-</button>
			<button class="width25p" id="unit-price1">-</button>
			
			<button class="label20p">选哪个</button>
			<button class="width25p" id="result3">?</button>
			<button class="width25p" id="result2">?</button>
			<button class="width25p" id="result1">?</button>
		</div>
		<div class="numpad">
			<button class="numbtn" onclick="keyInput('1');">1</button>
			<button class="numbtn" onclick="keyInput('2');">2</button>
			<button class="numbtnRight" onclick="keyInput('3');">3</button>
			<br />
			<button class="numbtn" onclick="keyInput('4');">4</button>
			<button class="numbtn" onclick="keyInput('5');">5</button>
			<button class="numbtnRight" onclick="keyInput('6');">6</button>
			<br />
			<button class="numbtn" onclick="keyInput('7');">7</button>
			<button class="numbtn" onclick="keyInput('8');">8</button>
			<button class="numbtnRight" onclick="keyInput('9');">9</button>
			<br />
			<button class="numbtnBottom" onclick="keyInput('0');">0</button>
			<button class="numbtnBottom" onclick="keyInput('.');">·</button>
			<button class="numbtn" style="border:2px solid #CC044D;" onclick="keyInput('bk');">&#8672</button>
			<br />
		</div>
		<div class="arrowpad">
			<button class="arrowbtn" onclick="moveFocus('U');">&#9650</button>
			<br />
			<button class="arrowbtn" onclick="moveFocus('L');">&#9668</button>
			<button class="arrowbtn" style="margin-left:30%;" onclick="moveFocus('R');">&#9658</button>
			<br />
			<button class="arrowbtn" onclick="moveFocus('D');">&#9660</button>
		</div>
		<div class="ctrlpad">
			<button class="ctrlbtn" onclick="reInput();">重输</button>
			<button class="ctrlbtn" style="margin-left:10%;" onclick="allCls();">全清</button>
			<br />			
			<button class="ctrlbtn" style="width:100%;" onclick="calcResult();">帮我算</button>
		</div>
	</div>
</body>

</html>
